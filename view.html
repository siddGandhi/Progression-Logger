<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Workout History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Workout Log</h2>

    <a href="index.html" class="page-switch">Back</a>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Movement</th>
          <th>Weight</th>
          <th>Reps</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="workout-table-body">
        </tbody>
    </table>

    <script type="module">
      import { workoutService } from "./db-service.js";

      const tbody = document.getElementById("workout-table-body");
      let allWorkouts = [];

      // --- UI Helper Functions ---

      function closeAllDropdowns() {
        document.querySelectorAll(".dropdown-menu.show").forEach((menu) => {
          menu.classList.remove("show");
        });
      }

      // --- Data Fetching & Rendering ---

      async function loadAndRender() {
        try {
          allWorkouts = await workoutService.getAllWorkouts();
          renderRows(allWorkouts);
        } catch (error) {
          console.error("Failed to load workouts:", error);
          tbody.innerHTML = "<tr><td colspan='5'>Error loading data.</td></tr>";
        }
      }

      function renderRows(data) {
        tbody.innerHTML = "";
        const total = data.length;

        if (total === 0) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No workouts logged yet.</td></tr>";
          return;
        }

        data.forEach((entry, index) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${total - index}</td>
            <td>${entry.movement}</td>
            <td>${parseFloat(entry.weight).toFixed(1)} lbs</td>
            <td>${entry.reps}</td>
            <td class="actions-cell">
              <button class="menu-btn"><span></span><span></span><span></span></button>
              <div class="dropdown-menu">
                <a href="#" class="dropdown-item delete-action">Delete</a>
              </div>
            </td>
          `;

          const menuBtn = row.querySelector(".menu-btn");
          menuBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const dropdown = menuBtn.nextElementSibling;
            const isOpen = dropdown.classList.contains("show");
            closeAllDropdowns();
            if (!isOpen) dropdown.classList.add("show");
          });

          row.querySelector(".delete-action").addEventListener("click", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (confirm("Are you sure you want to delete this log?")) {
              await workoutService.deleteWorkout(entry.id);
              loadAndRender();
            }
          });

          tbody.appendChild(row);
        });
      }

      // Initial Load
      loadAndRender();
    </script>
  </body>
</html>
