<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Workout History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Workout Log</h2>

    <a href="index.html" class="page-switch">Back</a>

    <div class="search-container">
      <input 
        type="text" 
        id="historySearch" 
        placeholder="Search movements..." 
        autocomplete="off"
      />
      <button id="clearSearch" class="secondary-btn">Clear</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Movement</th>
          <th>Weight</th>
          <th>Reps</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="workout-table-body">
      </tbody>
    </table>

    <script type="module">
      import { workoutService } from "./db-service.js";

      const tbody = document.getElementById("workout-table-body");
      const searchInput = document.getElementById("historySearch");
      const clearBtn = document.getElementById("clearSearch");
      let allWorkouts = [];

      // --- UI Helper Functions ---

      function closeAllDropdowns() {
        document.querySelectorAll(".dropdown-menu.show").forEach((menu) => {
          menu.classList.remove("show");
        });
      }

      // GLOBAL CLICK LISTENER: Detects clicks outside the menu
      document.addEventListener("click", (e) => {
        // If the user clicks something that ISN'T the menu button or the menu itself...
        if (!e.target.closest(".menu-btn") && !e.target.closest(".dropdown-menu")) {
          closeAllDropdowns();
        }
      });

      // --- Search Logic ---

      searchInput.addEventListener("input", () => {
        const searchTerm = searchInput.value.toLowerCase();
        const filteredData = allWorkouts.filter(entry => {
          return entry.movement && 
                entry.movement !== "DAILY_MARKER" && 
                entry.movement.toLowerCase().includes(searchTerm);
        });
        renderRows(filteredData);
      });

      clearBtn.addEventListener("click", () => {
        searchInput.value = "";
        renderRows(allWorkouts);
      });

      // --- Data Fetching & Rendering ---

      async function loadAndRender() {
        try {
          allWorkouts = await workoutService.getAllWorkouts();
          renderRows(allWorkouts);
        } catch (error) {
          console.error("Failed to load workouts:", error);
          tbody.innerHTML = "<tr><td colspan='5'>Error loading data.</td></tr>";
        }
      }

      function renderRows(data) {
        tbody.innerHTML = "";
        const total = data.length;

        if (total === 0) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No workouts logged yet.</td></tr>";
          return;
        }

        data.forEach((entry, index) => {
          if (entry.movement === "DAILY_MARKER") {
            const bannerRow = document.createElement("tr");
            const dateText = new Date(entry.date).toLocaleDateString(undefined, {
              weekday: 'long', month: 'long', day: 'numeric'
            });

            bannerRow.innerHTML = `
              <td colspan="5" class="date-divider-row">
                Workout — ${dateText}
              </td>
            `;
            tbody.appendChild(bannerRow);
            return;
          }
          
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${total - index}</td>
            <td>${entry.movement}</td>
            <td>${parseFloat(entry.weight).toFixed(1)} lbs</td>
            <td>${entry.reps}</td>
            <td class="actions-cell">
              <button class="menu-btn"><span></span><span></span><span></span></button>
              <div class="dropdown-menu">
                <a href="#" class="dropdown-item swap-action">Swap</a>
                <a href="#" class="dropdown-item delete-action">Delete</a>
              </div>
            </td>
          `;

          const menuBtn = row.querySelector(".menu-btn");
          menuBtn.addEventListener("click", (e) => {
            // Stop propagation so the global 'click off' listener doesn't trigger immediately
            e.stopPropagation(); 
            const dropdown = menuBtn.nextElementSibling;
            const isOpen = dropdown.classList.contains("show");
            
            closeAllDropdowns(); // Close any other open menus
            if (!isOpen) dropdown.classList.add("show");
          });

          row.querySelector(".delete-action").addEventListener("click", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (confirm("Are you sure you want to delete this log?")) {
              await workoutService.deleteWorkout(entry.id);
              loadAndRender();
            }
          });

          row.querySelector(".swap-action").addEventListener("click", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            try {
              await workoutService.swapWeightAndReps(entry.id, entry.weight, entry.reps);
              closeAllDropdowns();
              loadAndRender();
            } catch (error) {
              console.error("Swap failed:", error);
              alert("Could not swap values.");
            }
          });

          tbody.appendChild(row);
        });
      }

      loadAndRender();
    </script>
  </body>
</html>
