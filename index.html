<!DOCTYPE html>
<html>
  <head>
    <title>Progression Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Workout Logger</h2>

    <a href="view.html" class="page-switch">View Logs</a>

    <form id="logForm">
      <div class="field-container">
        <input
          type="search"
          id="movement"
          placeholder="Movement"
          autocomplete="off"
          required
        />
        <div id="suggestions"></div>
      </div>
      <input
        type="number"
        inputmode="numeric"
        id="reps"
        placeholder="Reps"
        required
      />
      <input
        type="number"
        inputmode="decimal"
        id="weight"
        placeholder="Weight"
        step="0.5"
        required
      />
      <button type="submit">Log Workout</button>
    </form>

    <p id="response"></p>

    <script type="module">
      import { officialMovements } from "./movements.js";
      import { workoutService } from "./db-service.js";

      const form = document.getElementById("logForm");
      const movementInput = document.getElementById("movement");
      const repsInput = document.getElementById("reps");
      const weightInput = document.getElementById("weight");
      const response = document.getElementById("response");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const enteredMovement = movementInput.value.trim();
        if (!officialMovements.includes(enteredMovement)) {
          response.textContent = "Invalid movement. Please select from the list.";
          return;
        }

        try {
          await workoutService.addWorkout(
            enteredMovement, 
            repsInput.value, 
            weightInput.value
          );
          
          response.textContent = "Workout logged!";
          form.reset();
        } catch (err) {
          response.textContent = "Error: " + err.message;
        }
      });

      // --- Suggestions Logic ---
      const suggestionsBox = document.getElementById("suggestions");

      movementInput.addEventListener("input", () => {
        const val = movementInput.value.toLowerCase();
        suggestionsBox.innerHTML = "";
        
        if (!val) {
          suggestionsBox.style.display = "none";
          return;
        }

        // Filter movements from movements.js
        const filtered = officialMovements.filter(m => m.toLowerCase().includes(val));
        
        if (filtered.length > 0) {
          filtered.forEach(m => {
            const div = document.createElement("div");
            div.className = "suggestion-item";
            div.textContent = m;
            
            // When a user clicks a suggestion
            div.onclick = () => {
              movementInput.value = m;
              suggestionsBox.style.display = "none";
            };
            suggestionsBox.appendChild(div);
          });
          suggestionsBox.style.display = "block";
        } else {
          suggestionsBox.style.display = "none";
        }
      });

      // Close the suggestions if the user clicks anywhere else
      window.addEventListener("click", (e) => {
        if (e.target !== movementInput) {
          suggestionsBox.style.display = "none";
        }
      });
    </script>
  </body>
</html>
